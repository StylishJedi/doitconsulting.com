<!DOCTYPE html>
<html>
<head>
    <title>Matrix Rain Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .matrix-column {
            position: absolute;
            top: -100%;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 12px;
            white-space: nowrap;
            text-shadow: 0 0 5px #00ff41;
            animation: matrix-fall linear infinite;
            opacity: 0.7;
        }
        .matrix-column.bright {
            color: #ffffff;
            text-shadow: 0 0 10px #00ff41;
            opacity: 1;
        }
        @keyframes matrix-fall {
            0% { 
                transform: translateY(-100vh);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% { 
                transform: translateY(100vh);
                opacity: 0;
            }
        }
        .test-text {
            position: relative;
            z-index: 10;
            color: #00ff41;
            text-align: center;
            padding-top: 200px;
            font-family: 'Courier New', monospace;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="matrix-rain" id="matrixRain"></div>
    <div class="test-text">MATRIX RAIN TEST - You should see falling code</div>
    
    <script>
        function createMatrixRain() {
            const matrixContainer = document.getElementById('matrixRain');
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?`~';
            const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
            
            const alphabet = chars + katakana;
            
            function createColumn() {
                const column = document.createElement('div');
                column.className = 'matrix-column';
                
                column.style.left = Math.random() * window.innerWidth + 'px';
                
                const duration = Math.random() * 5 + 3;
                column.style.animationDuration = duration + 's';
                column.style.animationDelay = Math.random() * 2 + 's';
                
                let text = '';
                const length = Math.floor(Math.random() * 20) + 10;
                for (let i = 0; i < length; i++) {
                    text += alphabet[Math.floor(Math.random() * alphabet.length)] + '\n';
                }
                column.textContent = text;
                
                if (Math.random() > 0.85) {
                    column.classList.add('bright');
                }
                
                matrixContainer.appendChild(column);
                
                setTimeout(() => {
                    if (column.parentNode) {
                        column.parentNode.removeChild(column);
                    }
                }, (duration + 2) * 1000);
            }
            
            // Create initial columns
            for (let i = 0; i < 20; i++) {
                setTimeout(createColumn, Math.random() * 2000);
            }
            
            setInterval(createColumn, 150);
        }
        
        document.addEventListener('DOMContentLoaded', createMatrixRain);
        console.log('Matrix rain test loaded');
    </script>
</body>
</html>
